{% extends 'pages/login/base.html' %}
{% load static %}

{% block title %}Gio hang - TechShop{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'login.css' %}">
<style>
    .cart-shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 0 24px;
    }

    .cart-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
    }

    .cart-title {
        font-size: 1.55rem;
        font-weight: 800;
        color: var(--text-dark);
    }

    .cart-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 20px;
        align-items: start;
    }

    .cart-list,
    .cart-summary-box,
    .empty-cart {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
    }

    .cart-list {
        overflow: hidden;
    }

    .cart-item {
        display: grid;
        grid-template-columns: 88px minmax(0, 1fr) 130px 120px 44px;
        gap: 14px;
        align-items: center;
        padding: 16px;
        border-bottom: 1px solid var(--border);
    }

    .cart-item:last-child {
        border-bottom: none;
    }

    .cart-thumb {
        width: 88px;
        aspect-ratio: 1;
        border-radius: var(--radius);
        background: #eef0f5;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-light);
        overflow: hidden;
        font-size: .82rem;
    }

    .cart-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .cart-name {
        font-weight: 700;
        color: var(--text-dark);
        line-height: 1.35;
    }

    .cart-price {
        margin-top: 4px;
        color: var(--primary);
        font-weight: 700;
    }

    .qty-control {
        display: inline-grid;
        grid-template-columns: 34px 42px 34px;
        height: 34px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--white);
    }

    .qty-control button {
        border: none;
        background: var(--bg);
        cursor: pointer;
        font-weight: 800;
        color: var(--text-mid);
    }

    .qty-control span {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
    }

    .line-total {
        text-align: right;
        font-weight: 800;
        color: var(--text-dark);
    }

    .remove-btn {
        width: 36px;
        height: 36px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--white);
        color: var(--primary);
        cursor: pointer;
        font-size: 1.1rem;
    }

    .cart-summary-box {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        position: sticky;
        top: 92px;
    }

    .summary-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--text-mid);
    }

    .summary-row.total {
        padding-top: 14px;
        border-top: 1px solid var(--border);
        color: var(--text-dark);
        font-size: 1.1rem;
        font-weight: 800;
    }

    .checkout-btn,
    .continue-btn {
        border-radius: var(--radius);
        padding: 12px 14px;
        text-align: center;
        font-weight: 800;
        cursor: pointer;
    }

    .checkout-btn {
        border: none;
        background: var(--primary);
        color: var(--white);
    }

    .continue-btn {
        border: 1px solid var(--border);
        background: var(--white);
        color: var(--text-dark);
        display: inline-block;
    }

    .empty-cart {
        padding: 34px 24px;
        text-align: center;
        color: var(--text-mid);
    }

    .empty-cart p {
        margin-bottom: 16px;
    }

    @media (max-width: 860px) {
        .cart-layout {
            grid-template-columns: 1fr;
        }

        .cart-item {
            grid-template-columns: 74px minmax(0, 1fr) 44px;
        }

        .cart-thumb {
            width: 74px;
        }

        .qty-control,
        .line-total {
            grid-column: 2 / 4;
        }

        .line-total {
            text-align: left;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="cart-shell">
    <div class="cart-header">
        <h1 class="cart-title">Gio hang</h1>
    </div>

    <div id="cartContent">
        <div class="empty-cart">Dang tai gio hang...</div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    const CART_API_BASE = 'http://127.0.0.1:8000/api';

    document.addEventListener('DOMContentLoaded', () => {
        loadCart();
    });

    async function loadCart() {
        const token = getAccessToken();
        if (!token) {
            renderLoginRequired();
            updateHeaderBadge(0);
            return;
        }

        try {
            const res = await fetch(`${CART_API_BASE}/auth/cart/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                renderLoginRequired();
                updateHeaderBadge(0);
                return;
            }

            if (!res.ok) throw new Error('Cannot load cart');

            const cart = await res.json();
            renderCart(cart);
            updateHeaderBadge(cart.total_quantity || 0);
        } catch (error) {
            document.getElementById('cartContent').innerHTML =
                '<div class="empty-cart">Khong the tai gio hang.</div>';
        }
    }

    function renderCart(cart) {
        const container = document.getElementById('cartContent');
        const items = cart.items || [];

        if (!items.length) {
            container.innerHTML = `
                <div class="empty-cart">
                    <p>Gio hang dang trong.</p>
                    <a class="continue-btn" href="/shop/">Tiep tuc mua hang</a>
                </div>
            `;
            return;
        }

        container.innerHTML = `
            <div class="cart-layout">
                <div class="cart-list">
                    ${items.map(item => renderCartItem(item)).join('')}
                </div>
                <aside class="cart-summary-box">
                    <div class="summary-row">
                        <span>So luong</span>
                        <strong>${cart.total_quantity || 0} san pham</strong>
                    </div>
                    <div class="summary-row">
                        <span>Tam tinh</span>
                        <strong>${formatPrice(cart.total_price || 0)}</strong>
                    </div>
                    <div class="summary-row total">
                        <span>Tong cong</span>
                        <strong>${formatPrice(cart.total_price || 0)}</strong>
                    </div>
                    <button class="checkout-btn" type="button">Thanh toan</button>
                    <a class="continue-btn" href="/shop/">Tiep tuc mua hang</a>
                </aside>
            </div>
        `;
    }

    function renderCartItem(item) {
        const image = item.image
            ? `<img src="${item.image}" alt="${escapeHtml(item.product_name)}">`
            : '<span>Image</span>';

        return `
            <article class="cart-item">
                <div class="cart-thumb">${image}</div>
                <div>
                    <div class="cart-name">${escapeHtml(item.product_name)}</div>
                    <div class="cart-price">${formatPrice(item.price)}</div>
                </div>
                <div class="qty-control">
                    <button type="button" onclick="changeQuantity(${item.id}, ${item.quantity - 1})">-</button>
                    <span>${item.quantity}</span>
                    <button type="button" onclick="changeQuantity(${item.id}, ${item.quantity + 1})">+</button>
                </div>
                <div class="line-total">${formatPrice(item.line_total)}</div>
                <button class="remove-btn" type="button" title="Xoa" onclick="removeCartItem(${item.id})">&times;</button>
            </article>
        `;
    }

    async function changeQuantity(itemId, quantity) {
        const token = getAccessToken();
        if (!token) return renderLoginRequired();

        try {
            const res = await fetch(`${CART_API_BASE}/auth/cart/items/${itemId}/`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ quantity })
            });
            const cart = await res.json();

            if (!res.ok) {
                alert(cart.error || 'Khong the cap nhat gio hang.');
                return;
            }

            renderCart(cart);
            updateHeaderBadge(cart.total_quantity || 0);
        } catch (error) {
            alert('Khong the ket noi backend.');
        }
    }

    async function removeCartItem(itemId) {
        const token = getAccessToken();
        if (!token) return renderLoginRequired();

        try {
            const res = await fetch(`${CART_API_BASE}/auth/cart/items/${itemId}/delete/`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const cart = await res.json();

            if (!res.ok) {
                alert(cart.error || 'Khong the xoa san pham.');
                return;
            }

            renderCart(cart);
            updateHeaderBadge(cart.total_quantity || 0);
        } catch (error) {
            alert('Khong the ket noi backend.');
        }
    }

    function renderLoginRequired() {
        document.getElementById('cartContent').innerHTML = `
            <div class="empty-cart">
                <p>Ban can dang nhap de xem gio hang.</p>
                <a class="continue-btn" href="/login/">Dang nhap</a>
            </div>
        `;
    }

    function updateHeaderBadge(totalQuantity) {
        const badge = document.querySelector('.header-actions .badge');
        if (badge) {
            badge.textContent = totalQuantity;
        }
    }

    function getAccessToken() {
        return localStorage.getItem('access_token') || '';
    }

    function formatPrice(price) {
        return new Intl.NumberFormat('vi-VN', {
            style: 'currency',
            currency: 'VND'
        }).format(Number(price));
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
</script>
{% endblock %}
